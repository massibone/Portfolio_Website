<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Media Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .card { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .item { padding: 10px; border-bottom: 1px solid #ddd; }
        .controls { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .btn-small { padding: 2px 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>➕ Aggiungi</h3>
    <input type="text" id="titolo" placeholder="Nome Serie/Film">
    <select id="stato">
        <option value="Da_vedere">Da vedere</option>
        <option value="In_corso">In corso</option>
        <option value="Visto">Visto</option>
    </select>
    <button onclick="aggiungiMedia()">Aggiungi</button>
</div>

<div class="card">
    <select id="filtroStato" onchange="render()">
        <option value="Tutti">Mostra tutto</option>
        <option value="Da_vedere">Da vedere</option>
        <option value="In_corso">In corso</option>
        <option value="Visto">Visto</option>
    </select>
    <div id="listaMedia"></div>
</div>

<script>
    let mediaList = JSON.parse(localStorage.getItem('myMedia') || '[]');

    function aggiungiMedia() {
        const t = document.getElementById('titolo');
        if(!t.value) return;
        mediaList.unshift({ 
            nome: t.value, 
            stato: document.getElementById('stato').value, 
            s: 1, e: 0, ts: Date.now() 
        });
        salvaEAggiorna();
        t.value = '';
    }

    function rinomina(index) {
        const nuovoNome = prompt("Modifica nome:", mediaList[index].nome);
        if (nuovoNome) { mediaList[index].nome = nuovoNome; salvaEAggiorna(); }
    }

    function aggiornaProgresso(index, tipo, delta) {
        if(tipo === 's') mediaList[index].s = Math.max(1, (mediaList[index].s || 1) + delta);
        if(tipo === 'e') mediaList[index].e = Math.max(0, (mediaList[index].e || 0) + delta);
        mediaList[index].ts = Date.now();
        salvaEAggiorna();
    }

    function render() {
        const filtro = document.getElementById('filtroStato').value;
        const cont = document.getElementById('listaMedia');
        cont.innerHTML = '';
        
        mediaList.sort((a,b) => b.ts - a.ts).forEach((m, originalIndex) => {
            // Logica filtro
            if (filtro !== 'Tutti' && m.stato !== filtro) return;

            const index = mediaList.indexOf(m);
            cont.innerHTML += `
            <div class="item">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${m.nome}</strong>
                    <button class="btn-small" onclick="rinomina(${index})">✏️</button>
                </div>
                <div class="controls">
                    <span>S${m.s || 1} E${m.e || 0}</span>
                    <div>
                        <button class="btn-small" onclick="aggiornaProgresso(${index}, 's', 1)">S+</button>
                        <button class="btn-small" onclick="aggiornaProgresso(${index}, 'e', 1)">E+</button>
                        <button class="btn-small" onclick="elimina(${index})">X</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function salvaEAggiorna() {
        localStorage.setItem('myMedia', JSON.stringify(mediaList));
        render();
    }

    function elimina(i) { if(confirm("Eliminare?")) { mediaList.splice(i, 1); salvaEAggiorna(); } }

    render();
</script>
</body>
</html>
