<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Serie TV Tracker Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; }
        .card { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .item { display: flex; flex-direction: column; padding: 10px; border-bottom: 1px solid #ddd; }
        .controls { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h3>➕ Aggiungi</h3>
    <input type="text" id="titolo" placeholder="Nome Serie/Film">
    <select id="stato">
        <option value="Da_vedere">Da vedere</option>
        <option value="Visto">Visto</option>
        <option value="In_corso">In corso</option>
    </select>
    <button onclick="aggiungiMedia()">Aggiungi</button>
</div>

<div class="card">
    <select id="filtroStato" onchange="render()">
        <option value="Tutti">Mostra tutto</option>
        <option value="Da_vedere">Da vedere</option>
        <option value="In_corso">In corso</option>
        <option value="Visto">Visto</option>
    </select>
    <div id="listaMedia"></div>
</div>

<script>
    let mediaList = JSON.parse(localStorage.getItem('myMedia') || '[]');

    function aggiungiMedia() {
        const t = document.getElementById('titolo');
        const s = document.getElementById('stato');
        // Aggiungiamo S1 E0 come base
        mediaList.unshift({ nome: t.value, stato: s.value, s: 1, e: 0, ts: Date.now() });
        salvaEAggiorna();
        t.value = '';
    }

    function aggiornaProgresso(index, tipo, delta) {
        if(tipo === 's') mediaList[index].s = Math.max(1, mediaList[index].s + delta);
        if(tipo === 'e') mediaList[index].e = Math.max(0, mediaList[index].e + delta);
        mediaList[index].ts = Date.now(); // Aggiorna timestamp per ordinamento
        salvaEAggiorna();
    }

    function render() {
        const filtro = document.getElementById('filtroStato').value;
        const cont = document.getElementById('listaMedia');
        cont.innerHTML = '';
        
        // Ordina per ultimo aggiornato (timestamp)
        const listaOrdinata = mediaList.sort((a,b) => b.ts - a.ts);

        listaOrdinata.filter(m => filtro === 'Tutti' || m.stato === filtro).forEach((m, i) => {
            const index = mediaList.indexOf(m);
            cont.innerHTML += `
            <div class="item">
                <strong>${m.nome}</strong>
                <div class="controls">
                    <span>S${m.s} E${m.e}</span>
                    <div>
                        <button onclick="aggiornaProgresso(${index}, 's', 1)">S+</button>
                        <button onclick="aggiornaProgresso(${index}, 'e', 1)">E+</button>
                        <button onclick="elimina(${index})">X</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function salvaEAggiorna() {
        localStorage.setItem('myMedia', JSON.stringify(mediaList));
        render();
    }

    function elimina(i) { if(confirm("Eliminare?")) { mediaList.splice(i, 1); salvaEAggiorna(); } }

    render();
</script>
</body>
</html>
