<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Spese-Flash Controllo Budget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f5f5f5;color:#333}
        .container{max-width:480px;margin:0 auto;padding:1rem}
        .card{background:#fff;border-radius:8px;margin:.5rem 0;padding:.8rem;box-shadow:0 2px 4px rgba(0,0,0,.1)}
        .alert-box { background: #e8f6f3; padding: 10px; border-radius: 8px; border-left: 5px solid #27ae60; font-size: 0.9rem; }
        input,select{width:100%;padding:.4rem;margin:.2rem 0;border:1px solid #ccc;border-radius:4px}
        button{background:#27ae60;color:#fff;border:none;border-radius:4px;padding:.5rem 1rem;width:100%;cursor:pointer}
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>➕ Inserisci Spesa</h3>
        <input type="number" id="importo" placeholder="Importo reale pagato (€)" step="0.01" required>
        <select id="categoria">
            <optgroup label="Fisse (Budget 800€)">
                <option value="fisse-corrente">Alimentari / Bollette / Trasporti</option>
                <option value="fisse-annuale">Manutenzione / RCA / Bolli (Dividi per 12)</option>
            </optgroup>
            <optgroup label="Variabili (Budget 455€)">
                <option value="var-abbigliamento">Abbigliamento & Cura (Incl. Mediche)</option>
                <option value="var-ristorazione">Ristorazione (Cibo/Caffè/Birre)</option>
                <option value="var-viaggi">Viaggi</option>
                <option value="var-altro">Altro</option>
            </optgroup>
        </select>
        <input type="text" id="nota" placeholder="Nota (es: bolletta gas, cene amici)">
        <button id="salvaBtn">✅ Verifica Impatto</button>
    </div>

    <div class="card">
        <h3>📊 Stato Budget</h3>
        <div id="risultato" class="alert-box">
            Inserisci una spesa per vedere come incide sul tuo obiettivo.
        </div>
    </div>
</div>

<script>
const budgetTarget = { fisse: 800, variabili: 455 };

document.getElementById('salvaBtn').addEventListener('click', () => {
    const importo = parseFloat(document.getElementById('importo').value);
    const cat = document.getElementById('categoria').value;
    const nota = document.getElementById('nota').value || "Spesa";
    
    let impattoMese = 0;
    let categoria = "";
    
    if (cat === 'fisse-corrente') {
        impattoMese = importo;
        categoria = "Fisse";
    } else if (cat === 'fisse-annuale') {
        impattoMese = importo / 12;
        categoria = "Fisse (Quota 1/12)";
    } else {
        impattoMese = importo;
        categoria = "Variabili";
    }

    const tipo = cat.includes('fisse') ? 'fisse' : 'variabili';
    const residuo = budgetTarget[tipo] - impattoMese;

    document.getElementById('risultato').innerHTML = `
        <strong>Categoria:</strong> ${categoria}<br>
        <strong>Impatto sul mese:</strong> €${impattoMese.toFixed(2)}<br>
        <strong>Residuo Budget ${tipo.toUpperCase()}:</strong> €${residuo.toFixed(2)}<br><br>
        <em>Nota: ${nota}</em>
    `;
});
</script>
</body>
</html>
