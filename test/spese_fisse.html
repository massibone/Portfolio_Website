<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Spese-Flash Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f5f5f5;color:#333}
        .container{max-width:480px;margin:0 auto;padding:1rem}
        .card{background:#fff;border-radius:8px;margin:.5rem 0;padding:.8rem;box-shadow:0 2px 4px rgba(0,0,0,.1)}
        .stat-box { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        button{background:#27ae60;color:#fff;border:none;border-radius:4px;padding:.5rem;width:100%;cursor:pointer;margin-top:5px}
        .btn-extra{background:#3498db;}
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>➕ Aggiungi Spesa</h3>
        <input type="number" id="importo" placeholder="Importo reale (€)" required>
        <select id="categoria">
            <option value="fisse-corrente">Fisse: Alimentari/Bollette</option>
            <option value="fisse-annuale">Fisse: RCA/Tagliando (1/12)</option>
            <option value="var-abbigliamento">Variabili: Abbigliamento/Mediche</option>
            <option value="var-ristorazione">Variabili: Ristorazione</option>
            <option value="var-altro">Variabili: Altro</option>
        </select>
        <input type="text" id="nota" placeholder="Nota">
        <button onclick="salvaSpesa()">✅ Salva</button>
    </div>

    <div class="card">
        <h3>📊 Riepilogo Totale</h3>
        <div id="riepilogo"></div>
        <button class="btn-extra" onclick="esportaCSV()">📥 Esporta CSV</button>
        <button class="btn-extra" style="background:#e67e22;" onclick="importaCSV()">📤 Importa CSV</button>
    </div>
</div>

<script>
const budget = { fisse: 800, variabili: 455 };
let spese = JSON.parse(localStorage.getItem('mieiDati')) || [];

function salvaSpesa() {
    const importo = parseFloat(document.getElementById('importo').value);
    const cat = document.getElementById('categoria').value;
    const nota = document.getElementById('nota').value;
    
    if(!importo) return;

    const impatto = cat === 'fisse-annuale' ? importo / 12 : importo;
    const tipo = cat.includes('fisse') ? 'fisse' : 'variabili';
    
    spese.push({ tipo, impatto, cat, nota, data: new Date().toISOString() });
    localStorage.setItem('mieiDati', JSON.stringify(spese));
    render();
}

function render() {
    let tot = { fisse: 0, variabili: 0 };
    spese.forEach(s => tot[s.tipo] += s.impatto);
    
    document.getElementById('riepilogo').innerHTML = `
        <div class="stat-box"><span>Fisse (Target 800€):</span> <strong>${tot.fisse.toFixed(2)}€</strong></div>
        <div class="stat-box"><span>Residuo Fisse:</span> <strong>${(budget.fisse - tot.fisse).toFixed(2)}€</strong></div>
        <hr>
        <div class="stat-box"><span>Variabili (Target 455€):</span> <strong>${tot.variabili.toFixed(2)}€</strong></div>
        <div class="stat-box"><span>Residuo Variabili:</span> <strong>${(budget.variabili - tot.variabili).toFixed(2)}€</strong></div>
    `;
}

function esportaCSV() {
    let csv = "Data,Tipo,Impatto,Categoria,Nota\n";
    spese.forEach(s => csv += `${s.data},${s.tipo},${s.impatto},${s.cat},"${s.nota}"\n`);
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'spese_backup.csv'; a.click();
}

function importaCSV() {
    const input = prompt("Incolla qui il contenuto del CSV (formato Data,Tipo,Impatto,Categoria,Nota):");
    if (!input) return;
    try {
        const lines = input.split('\n').slice(1);
        spese = lines.map(line => {
            const [data, tipo, impatto, cat, nota] = line.split(',');
            return { tipo, impatto: parseFloat(impatto), cat, nota: nota.replace(/"/g, '') };
        }).filter(s => s.tipo);
        localStorage.setItem('mieiDati', JSON.stringify(spese));
        render();
        alert("Dati importati correttamente!");
    } catch(e) { alert("Errore nel formato del file!"); }
}

render();
</script>
</body>
</html>
