<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Spese-Flash Budget</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f5f5f5;color:#333}
        .container{max-width:480px;margin:0 auto;padding:1rem}
        header{background:#2c3e50;color:#fff;padding:.5rem 1rem;text-align:center;font-size:1.2rem; display:flex; justify-content:space-between; align-items:center; border-radius:8px;}
        .card{background:#fff;border-radius:8px;margin:.5rem 0;padding:.8rem;box-shadow:0 2px 4px rgba(0,0,0,.1)}
        button{background:#27ae60;color:#fff;border:none;border-radius:4px;padding:.5rem 1rem;margin:.2rem;cursor:pointer}
        input,select{width:100%;padding:.4rem;margin:.2rem 0;border:1px solid #ccc;border-radius:4px}
        ul{list-style:none;padding:0}
        li{padding:.5rem 0;border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;}
        .budget-box { background: #e8f6f3; padding: 10px; border-radius: 8px; font-size: 0.85rem; margin-top: 10px; }
        .hidden{display:none}
    </style>
</head>
<body>

<div class="container">
    <header>
        <button onclick="cambiaMese(-1)" style="background:transparent; color:white; border:none;">⬅️</button>
        <span id="headerMese"></span>
        <button onclick="cambiaMese(1)" style="background:transparent; color:white; border:none;">➡️</button>
    </header>

    <div class="card">
        <h3>➕ Aggiungi spesa</h3>
        <input type="number" id="importo" placeholder="Importo (€)" step="0.01" required>
        <input type="date" id="dataSpesa" required>
        <select id="categoria" required>
    <option value="">Seleziona categoria</option>
    <option value="Fisse">Spesa alimentare</option>
    <option value="Fisse">Casa & Bollette</option>
    <option value="Fisse">Trasporti (Benzina/Varie)</option>
    <option value="Annuali">RCA / Bollo / Annui</option> <option value="Variabili">Abbigliamento & Cura</option>
    <option value="Variabili">Cibo & Bevande fuori</option>
    <option value="Variabili">TempoLibero & Hobby</option>
    <option value="Variabili">Regali & Eventi</option>
    <option value="Variabili">Altro</option>
    <option value="Investimento">Risparmi</option>
</select>
        <input type="text" id="nota" placeholder="Nota (es: capelli)">
        <button id="salvaBtn" disabled>✅ Salva</button>
    </div>

    <div id="riepilogoBudget" class="card"></div>
    <div class="card">
        <h3>📋 Lista spese</h3>
        <ul id="listaSpese"></ul>
    </div>
</div>

<script>
const budget = { Fisse: 800, Variabili: 455, Investimento: 250 };
const storageKey = 'speseFlash_v2';
let dataVisualizzata = new Date();
document.getElementById('dataSpesa').valueAsDate = new Date();

function loadData(){ return JSON.parse(localStorage.getItem(storageKey)||'[]'); }
function saveData(arr){ localStorage.setItem(storageKey, JSON.stringify(arr)); }

function render() {
    const spese = loadData();
    const meseCorrente = dataVisualizzata.getMonth();
    const annoCorrente = dataVisualizzata.getFullYear();
    
    const speseMese = spese.filter(s => {
        const d = new Date(s.data);
        return d.getMonth() === meseCorrente && d.getFullYear() === annoCorrente;
    });

    let speso = { Fisse: 0, Variabili: 0, Investimento: 0 };
    const lista = document.getElementById('listaSpese');
    lista.innerHTML = '';

    speseMese.forEach((s, idx) => {
        speso[s.tipo] += s.importo;
        const li = document.createElement('li');
        li.innerHTML = `<span>${s.categoria} (${s.nota}): <strong>€${s.importo.toFixed(2)}</strong></span>
                        <button onclick="elimina(${idx})" style="background:#e74c3c;padding:2px 5px;">X</button>`;
        lista.appendChild(li);
    });

    const riepilogo = document.getElementById('riepilogoBudget');
    riepilogo.innerHTML = `<h3>Resoconto Budget</h3>
        ${Object.keys(budget).map(cat => `
            <div class="budget-box">
                <strong>${cat}:</strong> ${speso[cat].toFixed(2)}€ / ${budget[cat]}€ 
                (Residuo: <strong>${(budget[cat] - speso[cat]).toFixed(2)}€</strong>)
            </div>
        `).join('')}`;
    
    document.getElementById('headerMese').textContent = dataVisualizzata.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
}

document.getElementById('salvaBtn').addEventListener('click', () => {
    const spese = loadData();
    spese.push({
        importo: parseFloat(document.getElementById('importo').value),
        categoria: document.getElementById('categoria').options[document.getElementById('categoria').selectedIndex].text,
        tipo: document.getElementById('categoria').value,
        nota: document.getElementById('nota').value || '-',
        data: document.getElementById('dataSpesa').value
    });
    saveData(spese);
    render();
});

// Listener per abilitare pulsante
[document.getElementById('importo'), document.getElementById('categoria')].forEach(el => el.addEventListener('input', () => {
    document.getElementById('salvaBtn').disabled = !document.getElementById('importo').value || !document.getElementById('categoria').value;
}));

function cambiaMese(d) { dataVisualizzata.setMonth(dataVisualizzata.getMonth() + d); render(); }
function elimina(idx) { let s = loadData(); s.splice(idx,1); saveData(s); render(); }

render();
</script>
</body>
</html>
